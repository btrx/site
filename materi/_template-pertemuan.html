    <!-- Tambahkan <section class="slide"> ... </section> sebanyak yang dibutuhkan.
         Komponen siap pakai (lihat pertemuan-1.html untuk contoh nyata):
         .grid2 / .grid3 + .card   → kartu konsep
         .loop + .node             → diagram siklus / alur
         .steps + .step            → langkah aktivitas bernomor
         .refgames + .ref          → kartu referensi (4 kolom)
         .check                    → checklist penutup
         Kelas teks: .term (kuning), .en (biru miring), .pill (badge hijau) -->
